name: wallmotion
description: Live Wallpaper Premium untuk Android
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  cloud_functions: ^4.6.0

  # ── Video ─────────────────────────────────────────────────────────────
  video_player: ^2.8.3
  cached_network_image: ^3.3.1

  # ── Wallpaper ─────────────────────────────────────────────────────────
  wallpaper_manager_plus: any

  # ── Payment ───────────────────────────────────────────────────────────
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.5

  # ── State Management ──────────────────────────────────────────────────
  provider: ^6.1.2
  go_router: ^13.2.0

  # ── UI ────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

  # ── Utils ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.1.2
  http: ^1.2.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# ── App Icon ──────────────────────────────────────────────────────────────
flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#050508"
  adaptive_icon_foreground: "assets/images/icon_fg.png"

# ── Splash Screen ─────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#050508"
  image: assets/images/splash.png
  android_12:
    color: "#050508"
    image: assets/images/splash.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
